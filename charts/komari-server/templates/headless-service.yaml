apiVersion: v1
kind: Service
metadata:
  name: {{ include "komari-server.fullname" . }}-headless
  labels:
    {{- include "komari-server.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "komari-server.selectorLabels" . | nindent 4 }}
